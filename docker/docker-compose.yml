# ==========================================================
# Docker Compose do projeto IGV TP2
# Geoportal Analítico de Viana do Castelo
#
# Serviços principais:
# - db: base de dados PostgreSQL/PostGIS
# - geoserver: servidor cartográfico para publicação WMS/WFS
# - web: backend Express + frontend estático
# ==========================================================

name: igv

services:
  # ----------------------------------------------------------
  # Base de dados espacial PostgreSQL/PostGIS
  # ----------------------------------------------------------
  db:
    image: imresamu/postgis:16-3.4
    container_name: igv-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-igv}

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../sql:/sql:ro
      - ../data:/data:ro
      - ../webserver/public/geotiff:/geotiff:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-igv}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------
  # GeoServer
  # ----------------------------------------------------------
  geoserver:
    image: kartoza/geoserver:2.25.2
    container_name: igv-geoserver
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      CORS_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: "*"
      CORS_ALLOWED_METHODS: "GET,POST,HEAD,OPTIONS"
      CORS_ALLOWED_HEADERS: "*"
      HTTP_PROXY_NAME: "localhost"
      HTTP_PROXY_PORT: "8080"

    ports:
      - "8080:8080"

    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ../webserver/public/geotiff:/geotiff:ro

  # ----------------------------------------------------------
  # Aplicação Web
  # ----------------------------------------------------------
  web:
    image: node:20-alpine
    container_name: igv-web
    restart: unless-stopped
    working_dir: /app

    depends_on:
      db:
        condition: service_healthy

    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATABASE: ${POSTGRES_DB:-igv}

    command: sh -c "npm install --no-audit --no-fund && node server.js"

    ports:
      - "3000:3000"
    volumes:
      - ../webserver:/app

  # ----------------------------------------------------------
  # pgAdmin
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: igv-pgadmin
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

# ==========================================================
# Volumes persistentes
# ==========================================================
volumes:
  pgdata:
  geoserver_data:
  pgadmin_data: